<head>

    <link rel="manifest" href="data:application/json;charset=utf-8,{
        &quot;name&quot;:&quot;Secure Messenger&quot;,
        &quot;short_name&quot;:&quot;Messenger&quot;,
        &quot;start_url&quot;:&quot;.&quot;,
        &quot;display&quot;:&quot;standalone&quot;,
        &quot;background_color&quot;:&quot;#0b1120&quot;,
        &quot;theme_color&quot;:&quot;#0b1120&quot;,
        &quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230b1120'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.35em' font-size='60' fill='%2377ddff'%3E🔒%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --bg1: #0a0f1e; --bg2: #010101; --glass: rgba(15,25,45,0.4);
            --border: rgba(255,255,255,0.2); --text: #fff; --own-msg: #2c6e9e;
            --other-msg: rgba(255,255,240,0.12); --shadow: 0 25px 45px rgba(0,0,0,0.4);
        }
        body.light {
            --bg1: #d0d8e8; --bg2: #ffffff; --glass: rgba(200,210,240,0.7);
            --border: rgba(0,0,0,0.2); --text: #111; --own-msg: #4a8fbf; --other-msg: rgba(0,0,0,0.08);
        }
        body {
            background: radial-gradient(circle at 30% 10%, var(--bg1), var(--bg2));
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif; cursor: none; overflow: hidden;
            color: var(--text); transition: all 0.3s; padding: 0;
        }
        .glass { width: 95vw; height: 90vh; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 48px; border: 1px solid var(--border); box-shadow: var(--shadow);
            display: flex; flex-direction: column; transition: 0.2s; max-width: 1400px; }
        .glass:hover { transform: scale(1.01); }
        .header { padding: 20px 30px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .header h1 { background: linear-gradient(135deg, #ffb3ff, #77ddff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; gap: 12px; align-items: center; }
        input, button, select { background: rgba(0,0,0,0.6); border: 1px solid #77aaff; border-radius: 60px;
            padding: 8px 20px; color: white; font-weight: bold; outline: none; }
        body.light input, body.light button, body.light select { background: rgba(0,0,0,0.15); color: #000; }
        button { background: linear-gradient(135deg, #5f4bd0, #2cb67d); cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
        .main-area { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(0,0,0,0.45); border-right: 1px solid var(--border);
            padding: 20px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .sidebar h3 { margin-bottom: 5px; color: #ccddff; }
        #online-users-list { list-style: none; }
        #online-users-list li { padding: 8px 12px; margin: 8px 0; background: rgba(255,255,255,0.08);
            border-radius: 40px; cursor: pointer; }
        #online-users-list li.active { background: #2c7da0; box-shadow: 0 0 8px #2c7da0; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { background: var(--other-msg); border-radius: 28px; padding: 8px 20px; width: fit-content;
            max-width: 70%; backdrop-filter: blur(4px); position: relative; }
        .message.own { align-self: flex-end; background: var(--own-msg); }
        .message .sender { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .message .content { word-break: break-word; font-size: 16px; }
        .message .reactions { display: flex; gap: 6px; margin-top: 6px; font-size: 14px; }
        .message .reactions span { cursor: pointer; padding: 0 6px; border-radius: 20px; background: rgba(255,255,255,0.2); }
        .reply-indicator { font-size: 11px; opacity: 0.8; margin-bottom: 4px; border-left: 2px solid cyan; padding-left: 8px; }
        .delivery-status { font-size: 10px; margin-left: 8px; }
        .input-group { display: flex; gap: 8px; padding: 20px; flex-wrap: wrap; align-items: center; }
        #message-input { flex: 1; }
        #reply-bar, #pinned-message { font-size: 12px; padding: 0 20px 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        #pinned-message { background: rgba(0,0,0,0.6); border-radius: 20px; margin: 0 20px 8px; padding: 8px; display: none; }
        #typing-indicator { font-size: 12px; color: #aaa; padding: 0 20px; }
        .trail-particle { position: fixed; width: 12px; height: 12px; background: radial-gradient(circle, #ff66cc, #44aaff);
            border-radius: 50%; filter: blur(3px); animation: fadeOut 0.5s forwards; pointer-events: none; z-index: 9999; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(2.5); filter: blur(8px); } }
        .hand-cam { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 165px; border-radius: 20px;
            overflow: hidden; border: 2px solid cyan; z-index: 100; background: black; transition: width 0.1s, height 0.1s; box-shadow: 0 0 15px cyan; }
        .hand-cam video, .hand-cam canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .hand-cam-controls { position: absolute; top: 5px; right: 5px; display: flex; gap: 8px;
            background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 30px; z-index: 101; }
        .remote-video, .live-stream { position: fixed; top: 20px; right: 20px; width: 280px; border-radius: 20px;
            border: 2px solid white; background: black; z-index: 1000; }
        .live-stream { bottom: 20px; top: auto; }
        .finger-cursor { position: fixed; width: 22px; height: 22px; border-radius: 50%; background: red;
            border: 2px solid white; z-index: 99999; pointer-events: none; box-shadow: 0 0 10px red; transition: 0.02s linear; }
        .theme-toggle { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); border-radius: 30px; padding: 6px 12px; cursor: pointer; z-index: 1000; }
        .sidebar button, .sidebar select { width: 100%; margin-top: 5px; }
        .room-code-box { background: rgba(0,0,0,0.4); border-radius: 30px; padding: 12px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .room-code-box input { flex: 1; min-width: 100px; }
        .install-btn { position: fixed; bottom: 80px; left: 20px; background: rgba(0,0,0,0.6); border-radius: 30px; padding: 6px 14px; z-index: 1000; font-size: 12px; }

        
        /* لوحة الإيموجي المنبثقة */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: rgba(20,30,50,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);

        .emoji-picker button {
            background: none;

            border-radius: 10px;

        }
        .emoji-picker button:hover {
            background: rgba(255,255,255,0.2);

        }
        .emoji-picker.show {
            display: grid;
        }
        /* زر الإيموجي بجانب حقل الكتابة */
        .emoji-toggle-btn {

            background: rgba(0,0,0,0.3);
            border: 1px solid #77aaff;
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .emoji-toggle-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    // ================================================================
    // 1. المتغيرات العامة والتشفير (نفس الكود السابق)
    // ================================================================
    let myKeyPair, myUserId, peer, currentConn, currentRecipientId;
    let users = new Map();
    let myPublicKeyPem;
    let blockedUsers = JSON.parse(localStorage.getItem('blockedUsers') || '[]');
    let pendingMessages = JSON.parse(localStorage.getItem('pendingMessages') || '[]');
    let chats = JSON.parse(localStorage.getItem('chats') || '{}');
    let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
    let pinnedMessage = null, replyToMessage = null;
    let stats = { messagesSent:0, messagesReceived:0, sessionStart:Date.now() };
    let typingTimeout, isTyping=false;
    let pc=null, localStream=null, isScreenSharing=false, liveStreamPeer=null;
    let roomCode = localStorage.getItem('lastRoom') || '';

    async function generateKeyPair() {
        return await crypto.subtle.generateKey({
            name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: "SHA-256"
        }, true, ["encrypt","decrypt"]);
    }
    function ab2b64(ab) { return btoa(String.fromCharCode(...new Uint8Array(ab))); }
    function b642ab(b64) { return new Uint8Array(atob(b64).split('').map(c=>c.charCodeAt(0))).buffer; }
    async function encryptForPeer(message, recipientPublicKey, isImage=false, replyToId=null) {
        const sessionKey = crypto.getRandomValues(new Uint8Array(32));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const aesKey = await crypto.subtle.importKey("raw", sessionKey, { name: "AES-GCM" }, false, ["encrypt"]);
        const encryptedMsg = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, new TextEncoder().encode(message));
        const encryptedKey = await crypto.subtle.encrypt({ name: "RSA-OAEP" }, recipientPublicKey, sessionKey);
        return { iv: ab2b64(iv), encryptedData: ab2b64(encryptedMsg), encryptedKey: ab2b64(encryptedKey), isImage, replyTo: replyToId };
    }
    async function decryptMessage(pkg) {
        const iv = b642ab(pkg.iv);
        const encryptedData = b642ab(pkg.encryptedData);
        const encryptedKey = b642ab(pkg.encryptedKey);
        const sessionKey = await crypto.subtle.decrypt({ name: "RSA-OAEP" }, myKeyPair.privateKey, encryptedKey);
        const aesKey = await crypto.subtle.importKey("raw", sessionKey, { name: "AES-GCM" }, false, ["decrypt"]);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, encryptedData);
        return new TextDecoder().decode(decrypted);
    }
    async function exportPublicKey() { return ab2b64(await crypto.subtle.exportKey("spki", myKeyPair.publicKey)); }
    async function importPublicKey(pem) { return await crypto.subtle.importKey("spki", b642ab(pem), { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]); }
    async function getFingerprint() {
        const exported = await crypto.subtle.exportKey("spki", myKeyPair.publicKey);
        const hash = await crypto.subtle.digest("SHA-256", exported);
        return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
    }

    // ================================================================
    // 2. دوال حفظ واسترجاع المحادثات من localStorage
    // ================================================================
    function saveMessageToChat(recipientId, msg, isOwn, type='text', msgId=null) {
        if(!chats[recipientId]) chats[recipientId]=[];
        const msgObj = { from: isOwn?myUserId:recipientId, text: msg, timestamp:Date.now(), type, msgId:msgId||Date.now() };
        chats[recipientId].push(msgObj);
        localStorage.setItem('chats', JSON.stringify(chats));
    }

    // تحميل جميع المحادثات من localStorage وعرضها في الواجهة
    function loadAllChats() {
        const container = document.getElementById('messages-container');
        container.innerHTML = '';
        // إذا كان هناك مستلم محدد، نعرض محادثاته فقط
        if (currentRecipientId && chats[currentRecipientId]) {
            chats[currentRecipientId].forEach(msg => {
                appendMessage(msg.text, msg.from === myUserId, msg.from, msg.type==='image', msg.msgId);
            });
        } else {
            // عرض محادثات جميع المستخدمين (اختياري)
            for (let [id, msgs] of Object.entries(chats)) {
                msgs.forEach(msg => {
                    appendMessage(msg.text, msg.from === myUserId, msg.from, msg.type==='image', msg.msgId);
                });
            }
        }
        container.scrollTop = container.scrollHeight;
    }

    // استدعاء loadAllChats عند تحميل الصفحة وعند اختيار مستلم
    window.addEventListener('load', () => {
        setTimeout(loadAllChats, 100);
    });

    // تعديل loadChatHistory لاستخدام loadAllChats
    function loadChatHistory(peerId) {
        currentRecipientId = peerId;
        loadAllChats();
    }

    // ================================================================
    // 3. الإيموجيات - لوحة منبثقة
    // ================================================================
    const emojis = ['😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','😘','😗','😙','😚','🙂','🤗','🤩','🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯','😪','😫','😴','😌','😛','😜','😝','🤤','😒','😓','😔','😕','🙃','🤑','😲','☹️','🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','🥵','🥶','😳','🤪','😵','😡','😠','🤬','👍','👎','👏','🙌','🤲','🤝','🙏','✌️','🤟','🤘','👌','🤌','🤞','🤙','👋','🖐️','✋','🖖','👀','👁️','🧠','🫀','🫁','💋','👄','🦷','👅','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❤️‍🔥','💕','💞','💓','💗','💖','💘','💝','💟','☮️','✝️','☪️','🕉️','☸️','🪯','✡️','🔯','🕎','☯️','☦️','🛐','⛎','♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓','🪐','🌍','🌎','🌏','🌐','🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘','🌙','🌚','🌛','🌜','☀️','🌝','🌞','⭐','🌟','🌠','☁️','⛅','⛈️','🌤️','🌥️','🌦️','🌧️','🌨️','🌩️','⚡','🔥','💧','🌊','🌟','🌈','☂️','☔','⛱️','❄️','☃️','⛄','🌬️','💨','🌪️','🌫️','🌬️','🧘','🛀','🛌','🧖','🧗','🧘‍♂️','🧘‍♀️','🤸','🤼','🤽','🤾','🤹','🧙','🧚','🧛','🧜','🧝','🧞','🧟','🦸','🦹','🧠','🦾','🦿','🦴','🦷','👀','👁️','👅','👄','🫀','🫁','🧬','🦠','🧫','🧪','🔬','🔭','📡','💉','🩸','💊','🩹','🩺','🧺','🧻','🧼','🧽','🧴','🪒','🔪','🗡️','⚔️','🛡️','🚬','⚰️','⚱️','🏺','🔮','📿','🧿','💈','⚗️','🔭','🧰','🔧','🔩','⚙️','🗜️','⚖️','🔗','⛓️','🧲','⚔️','🗡️','🛡️','🏹','🪃','🪄','🪢','🪣','🪤','🪥','🪦','🪧','🪨','🪶','🪷','🪹','🪺','🪻','🪼','🪽','🪾','🪿','🫀','🫁','🫂','🫃','🫄','🫅','🫆','🫇','🫈','🫉','🫊','🫋','🫌','🫍','🫎','🫏','🫐','🫑','🫒','🫓','🫔','🫕','🫖','🫗','🫘','🫙','🫚','🫛','🫜','🫝','🫞','🫟','🫠'];

    // بناء الأزرار داخل اللوحة
function buildEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    picker.innerHTML = '';
    emojis.forEach(emoji => {
        const btn = document.createElement('button');
        btn.textContent = emoji;
        btn.type = 'button';
        btn.onclick = (e) => {
            e.stopPropagation();
            const input = document.getElementById('message-input');
            input.value += emoji;
            input.focus();
            picker.classList.remove('show');
        };
        picker.appendChild(btn);
        });
    }
    buildEmojiPicker();
    
    // زر فتح/إغلاق لوحة الإيموجي
    document.getElementById('emoji-toggle-btn').onclick = (e) => {
        e.stopPropagation();
        const picker = document.getElementById('emoji-picker');
        picker.classList.toggle('show');
    };
    
    // إغلاق اللوحة عند النقر خارجها
    document.addEventListener('click', (e) => {
        const picker = document.getElementById('emoji-picker');
        const btn = document.getElementById('emoji-toggle-btn');
        if (picker && btn && !picker.contains(e.target) && e.target !== btn) {
            picker.classList.remove('show');
        }
    });
    
    // ================================================================
    // 4. دوال الكتابة والتأكيد والبث والتذكيرات والإحصائيات (كما هي)
    // ================================================================
    function sendTyping(status) { if(currentConn?.open) currentConn.send({ type:'typing', status }); }
    function startTyping() {
        if(typingTimeout) clearTimeout(typingTimeout);

    // ================================================================
    // 6. إرسال الرسائل (مع دعم الإيموجي عبر الحقل)
    // ================================================================
    async function sendMessage(text, isImage=false, imageDataURL=null) {
        if (!currentConn) {
            if(!currentRecipientId) { appendSystemMessage("⚠️ اختر مستلم أولاً"); return; }
            pendingMessages.push({ to: currentRecipientId, text, isImage, dataURL:imageDataURL, timestamp:Date.now() });
            localStorage.setItem('pendingMessages',JSON.stringify(pendingMessages));
            appendSystemMessage(`📦 رسالة مؤجلة (غير متصل)`);
            return;
        }
        if (!currentRecipientId) { appendSystemMessage("⚠️ اختر مستلم أولاً"); return; }
        const recipientInfo = users.get(currentRecipientId);
        if (!recipientInfo || !recipientInfo.publicKey) return alert("المفتاح العام غير متوفر بعد");
        let content = text; if (isImage && imageDataURL) content = imageDataURL;
        const msgId = Date.now();
        const encrypted = await encryptForPeer(content, recipientInfo.publicKey, isImage, replyToMessage?.id || null);
        currentConn.send({ type: 'message', encrypted, msgId });
        appendMessage(`أنت: ${isImage? '📷 صورة' : text}`, true, myUserId, isImage, msgId);
        saveMessageToChat(currentRecipientId, isImage? 'صورة' : text, true, isImage?'image':'text', msgId);
        stats.messagesSent++;
        if(replyToMessage) { replyToMessage=null; document.getElementById('reply-bar').innerHTML=''; }
    }
    async function processPendingQueue() {
        for(let i=0; i<pendingMessages.length; i++) {
            const msg = pendingMessages[i];
            if(users.has(msg.to) && users.get(msg.to).conn && users.get(msg.to).publicKey) {
                currentRecipientId = msg.to; currentConn = users.get(msg.to).conn;
                await sendMessage(msg.text, msg.isImage, msg.dataURL);
                pendingMessages.splice(i,1); i--;
            }
        }
        localStorage.setItem('pendingMessages', JSON.stringify(pendingMessages));
    }

        for(let i=0; i<6; i++) code += chars[Math.floor(Math.random() * chars.length)];

        peer = new Peer(myUserId, { host: '0.peerjs.com', port: 443, secure: true });

    function connectToRoom(room) {
        // إنشاء رابط كامل يحتوي على peer و pubkey و room
        const link = window.location.href.split('?')[0] + `?peer=${encodeURIComponent(myUserId)}&pubkey=${encodeURIComponent(myPublicKeyPem)}&room=${room}`;
        navigator.clipboard.writeText(link).then(() => {
            appendSystemMessage(`🔗 رابط الغرفة: ${link} (تم نسخه)`, true);
        }).catch(() => {
            appendSystemMessage(`🔗 انسخ هذا الرابط: ${link}`, true);
        });
        // إرسال إعلان الغرفة عبر الاتصالات القائمة
        if(peer) {
            // نبحث عن أي اتصال مفتوح ونرسل إعلان الغرفة
            for(let [id, info] of users.entries()) {
                if(info.conn && info.conn.open) {
                    info.conn.send({ type: 'room-announce', room: room, userId: myUserId, publicKey: myPublicKeyPem });
                }
            }
        }
    }

    function connectToPeer(peerId, pubKey) {
        const conn = peer.connect(peerId);
        conn.on('open', () => {
            conn.send({ type: 'publicKey', publicKey: myPublicKeyPem, name: myUserId });
            users.set(peerId, { name: peerId, publicKey: null, conn, blocked: blockedUsers.includes(peerId) });
            importPublicKey(pubKey).then(pk => users.set(peerId, { ...users.get(peerId), publicKey: pk }));
            setupConnection(conn);
        });
    }

    function setupConnection(conn) {
        conn.on('data', async (data) => {
            if (blockedUsers.includes(conn.peer)) return;
            if (data.type === 'publicKey') {
                users.set(conn.peer, { name: data.name || conn.peer, publicKey: await importPublicKey(data.publicKey), conn, blocked: blockedUsers.includes(conn.peer) });
                updateUsersList(); appendSystemMessage(`🔑 استلام مفتاح عام من ${data.name || conn.peer}`);
            } else if (data.type === 'message') {
                const text = await decryptMessage(data.encrypted);
                const isImage = data.encrypted.isImage; const replyTo = data.encrypted.replyTo;
                appendMessage(`من ${users.get(conn.peer)?.name || conn.peer}: ${text}`, false, conn.peer, isImage, data.msgId, replyTo);
                saveMessageToChat(conn.peer, text, false, isImage?'image':'text', data.msgId);
                stats.messagesReceived++; playNotification(); sendDeliveryReceipt(conn.peer, data.msgId);
            } else if (data.type === 'delivery') { showDeliveryConfirmed(data.msgId); }
            else if (data.type === 'typing') { showTypingIndicator(data.status, conn.peer); }
            else if (data.type === 'liveStreamOffer') { joinLiveStream(data.streamId); }
            else if (data.type === 'webrtc-offer') handleWebRTCOffer(conn.peer, data.offer);
            else if (data.type === 'webrtc-answer') if(pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            else if (data.type === 'ice-candidate') if(pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            else if (data.type === 'reaction') { appendSystemMessage(`👍 تفاعل ${data.reaction} من ${users.get(conn.peer)?.name}`, false); }
            else if (data.type === 'room-announce') {
                if(data.room === roomCode && data.userId !== myUserId) {
                    appendSystemMessage(`👤 انضم ${data.userId} إلى الغرفة`, true);
                    users.set(data.userId, { name: data.userId, publicKey: await importPublicKey(data.publicKey), conn, blocked: false });
                    updateUsersList();
                }
            }
        });
        conn.on('close', () => { users.delete(conn.peer); updateUsersList(); appendSystemMessage(`❌ انقطع ${conn.peer}`); });
        conn.send({ type: 'publicKey', publicKey: myPublicKeyPem, name: myUserId });
        if(roomCode) {
            conn.send({ type: 'room-announce', room: roomCode, userId: myUserId, publicKey: myPublicKeyPem });
        }
    }

    // ================================================================
    // 9. مكالمات الفيديو ومشاركة الشاشة
    // ================================================================
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    async function startCall(stream) {
        if(!currentConn) { appendSystemMessage("❌ لا يوجد اتصال مع المستلم"); return; }
        if(!currentRecipientId) { appendSystemMessage("❌ اختر مستلم أولاً من القائمة"); return; }
        pc=new RTCPeerConnection(config);
        stream.getTracks().forEach(t=>pc.addTrack(t,stream));
        pc.ontrack=e=>showRemoteVideo(e.streams[0]);
        pc.onicecandidate=e=>{ if(e.candidate) currentConn.send({type:'ice-candidate', candidate:e.candidate}); };
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);
        currentConn.send({type:'webrtc-offer', offer});
    }
    async function handleWebRTCOffer(fromId, offer) {
        if(!confirm(`مكالمة فيديو مشفرة من ${users.get(fromId)?.name || fromId.slice(0,6)}. هل تقبل؟`)) return;
        try {
            localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
            pc=new RTCPeerConnection(config);
            localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer=await pc.createAnswer();
            await pc.setLocalDescription(answer);
            users.get(fromId)?.conn?.send({type:'webrtc-answer', answer});
            pc.ontrack=e=>showRemoteVideo(e.streams[0]);
            pc.onicecandidate=e=>{ if(e.candidate) users.get(fromId)?.conn?.send({type:'ice-candidate', candidate:e.candidate}); };
        } catch(e) { alert("تعذر الوصول إلى الكاميرا/الميكروفون"); }
    }
    function showRemoteVideo(stream) {
        let div=document.querySelector('.remote-video');
        if(!div){
            div=document.createElement('div'); div.className='remote-video';
            div.innerHTML='<video autoplay></video><button>إغلاق المكالمة</button>';
            document.body.appendChild(div);
            div.querySelector('button').onclick=()=>{
                div.remove();
                if(pc) pc.close();
                if(localStream) localStream.getTracks().forEach(t=>t.stop());
                pc=null;
                appendSystemMessage("🔴 تم إنهاء المكالمة");
            };
        }
        div.querySelector('video').srcObject=stream;
    }

        if(!currentRecipientId) return alert("اختر مستلم أولاً من قائمة المتصلين.");
        try {
            localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});

        } catch(e) { alert("لا يمكن الوصول إلى الكاميرا/الميكروفون"); }

    document.getElementById('screen-share-btn').onclick = async () => {

        try {
            const screenStream=await navigator.mediaDevices.getDisplayMedia({video:true});
            if(localStream) localStream.getTracks().forEach(t=>t.stop());
            localStream=screenStream;
            if(pc){
                const senders=pc.getSenders();
                const vs=senders.find(s=>s.track.kind==='video');

            isScreenSharing=true;

        } catch(e) { alert("تعذر الوصول إلى الشاشة"); }
    };

    async function exportBackup() {
        if(!myKeyPair) return;
        const backup={ privateKey: await crypto.subtle.exportKey("pkcs8", myKeyPair.privateKey), publicKey: myPublicKeyPem, blockedUsers, chats, theme: localStorage.getItem('userTheme')||'default' };
        const json=JSON.stringify(backup, (k,v)=>v instanceof ArrayBuffer?ab2b64(v):v);
        const blob=new Blob([json],{type:'application/json'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup_secure.json'; a.click();
    }

    };
    async function recordVoiceFingerprint() {
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        const mediaRecorder=new MediaRecorder(stream);
        let chunks=[];
        mediaRecorder.ondataavailable=e=>chunks.push(e.data);
        mediaRecorder.onstop=async()=>{
            const blob=new Blob(chunks,{type:'audio/webm'});
            const buffer=await blob.arrayBuffer();
            const hash=await crypto.subtle.digest('SHA-256', buffer);
            alert(`بصمة صوتك (SHA-256): ${ab2b64(hash).slice(0,16)}`);
            stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start();
        setTimeout(()=>mediaRecorder.stop(),3000);
    }
    document.getElementById('voice-fingerprint-btn').onclick=recordVoiceFingerprint;
    document.getElementById('clear-storage').onclick=()=>{
        if(confirm("حذف جميع البيانات المخزنة محلياً (المفاتيح والمحادثات)؟")){
            localStorage.clear();
            location.reload();
        }
    };

    // ================================================================
    // 11. استعادة التذكيرات والرسالة المثبتة والثيمات
    // ================================================================
    reminders.forEach(r=>{
        const delay=r.time-Date.now();
        if(delay>0) setTimeout(()=>{
            alert(`🔔 تذكير: ${r.message}`);
            reminders=reminders.filter(rem=>rem.id!==r.id);
            localStorage.setItem('reminders',JSON.stringify(reminders));
        }, delay);
    });
    const savedPin=localStorage.getItem('pinnedMessage');
    if(savedPin){ const p=JSON.parse(savedPin); pinMessage(p.id, p.text); }
    applyTheme(localStorage.getItem('userTheme')||'default');
    function setTheme(theme) {
        document.body.classList.toggle('light', theme==='light');
        localStorage.setItem('theme',theme);
    }
    document.getElementById('themeToggle').onclick = () => {
        const newTheme = document.body.classList.contains('light') ? 'dark' : 'light';
        setTheme(newTheme);
    };
    setTheme(localStorage.getItem('theme')||'dark');
    document.getElementById('message-input').addEventListener('input', startTyping);

    // ================================================================
    // 12. تتبع اليد وأثر الفأرة والكاميرا القابلة للسحب
    // ================================================================
    const handVideo=document.getElementById('hand-video'), handCanvas=document.getElementById('hand-canvas'), ctx=handCanvas.getContext('2d');
    let fingerCursor=null, lastHandPos={x:0,y:0};
    if(navigator.mediaDevices) navigator.mediaDevices.getUserMedia({video:true}).then(s=>handVideo.srcObject=s).catch(e=>console.warn);
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.6});
    hands.onResults(r=>{
        ctx.clearRect(0,0,handCanvas.width,handCanvas.height);
        if(r.multiHandLandmarks?.length){
            const lm=r.multiHandLandmarks[0];
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'#0ff',lineWidth:2});
            const idx=lm[8];
            const x=idx.x*window.innerWidth, y=idx.y*window.innerHeight;
            if(!fingerCursor){ fingerCursor=document.createElement('div'); fingerCursor.className='finger-cursor'; document.body.appendChild(fingerCursor); }
            fingerCursor.style.left=x-11+'px'; fingerCursor.style.top=y-11+'px';
            const thumb=lm[4];
            if(Math.hypot(thumb.x-idx.x, thumb.y-idx.y)<0.05){
                const elem=document.elementFromPoint(x,y);
                if(elem) elem.click();
                if(navigator.vibrate) navigator.vibrate(50);
            }
            const wrist=lm[0];
            const cx=wrist.x*window.innerWidth, cy=wrist.y*window.innerHeight;
            if(lastHandPos.x){
                const dy=cy-lastHandPos.y;
                if(Math.abs(dy)>15) window.scrollBy(0,-dy*0.5);
            }
            lastHandPos={x:cx,y:cy};
        } else{ if(fingerCursor) fingerCursor.remove(); fingerCursor=null; lastHandPos={x:0,y:0}; }
    });
    const camera=new Camera(handVideo,{onFrame:async()=>await hands.send({image:handVideo})});
    camera.start();

    document.addEventListener('mousemove',e=>{
        const trail=document.createElement('div');
        trail.className='trail-particle';
        trail.style.left=e.clientX-6+'px';
        trail.style.top=e.clientY-6+'px';
        document.getElementById('cursor-trail').appendChild(trail);
        setTimeout(()=>trail.remove(),500);
    });

    const handCamDiv=document.getElementById('handCam');
    let w=220,h=165;
    document.getElementById('zoomIn').onclick=()=>{ w+=20; h+=15; handCamDiv.style.width=w+'px'; handCamDiv.style.height=h+'px'; };
    document.getElementById('zoomOut').onclick=()=>{ w=Math.max(140,w-20); h=Math.max(105,h-15); handCamDiv.style.width=w+'px'; handCamDiv.style.height=h+'px'; };
    let drag=false, offX, offY;
    handCamDiv.addEventListener('mousedown',e=>{
        if(e.target.closest('.hand-cam-controls')) return;
        drag=true;
        const rect=handCamDiv.getBoundingClientRect();
        offX=e.clientX-rect.left;
        offY=e.clientY-rect.top;
    });
    window.addEventListener('mousemove',e=>{
        if(!drag) return;
        let left=e.clientX-offX, top=e.clientY-offY;
        left=Math.min(window.innerWidth-handCamDiv.offsetWidth, Math.max(0,left));
        top=Math.min(window.innerHeight-handCamDiv.offsetHeight, Math.max(0,top));
        handCamDiv.style.left=left+'px';
        handCamDiv.style.top=top+'px';
        handCamDiv.style.right='auto';
        handCamDiv.style.bottom='auto';
    });
    window.addEventListener('mouseup',()=>drag=false);

    // ================================================================
    // 13. تثبيت PWA
    // ================================================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-btn').style.display = 'block';
    });
    document.getElementById('install-btn').onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                console.log('تم تثبيت التطبيق');
            }
            deferredPrompt = null;
            document.getElementById('install-btn').style.display = 'none';
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>рҹ’¬ ЩҲШ§ШӘШіШ§ШЁ ШўЩ…ЩҶ</title>
    <style>
        /* ===== Ш§Щ„ШЈЩҶЩ…Ш§Ш· Ш§Щ„Ш№Ш§Щ…Ш© ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --primary: #075e54;
            --secondary: #128c7e;
            --bg-chat: #1a2a3a;
            --bg-sidebar: #131f2a;
            --text-light: #e9edf2;
            --text-muted: #8899aa;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --border-radius: 28px;
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0f1e;
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* ШҙШ§ШҙШ© ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШҜШ®ЩҲЩ„ */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 20%, #0b1120, #010101);
            z-index: 9999;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #login-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        #login-screen .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffb3ff, #77ddff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #login-screen h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: white;
            font-weight: 300;
        }
        #login-screen .input-group {
            width: 320px;
            margin: 8px 0;
        }
        #login-screen input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        #login-screen input:focus {
            border-color: #77ddff;
        }
        #login-screen button {
            padding: 14px 50px;
            background: linear-gradient(135deg, #5f4bd0, #2cb67d);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(44, 182, 125, 0.3);
        }
        #login-screen button:hover { transform: scale(1.03); }
        #login-screen .error {
            color: #ff6b6b;
            margin-top: 12px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #login-screen .error.show { opacity: 1; }

        /* ===== Ш§Щ„ШӘШ·ШЁЩҠЩӮ Ш§Щ„ШұШҰЩҠШіЩҠ ===== */
        #app {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--bg-chat);
            position: relative;
        }
        #app.active { display: flex; }

        /* Ш§Щ„ШҙШұЩҠШ· Ш§Щ„Ш¬Ш§ЩҶШЁЩҠ (Ш¬ЩҮШ§ШӘ Ш§Щ„Ш§ШӘШөШ§Щ„) */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-header {
            padding: 20px 16px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-header .profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5f4bd0, #2cb67d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .sidebar-header .status {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.online { background: #2cb67d; box-shadow: 0 0 8px #2cb67d; }
        .dot.offline { background: #ff6b6b; }
        .sidebar-header .actions {
            display: flex;
            gap: 8px;
        }
        .sidebar-header .actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.2s;
        }
        .sidebar-header .actions button:hover { background: rgba(255,255,255,0.05); }

        .sidebar-search {
            padding: 10px 16px;
            background: rgba(0,0,0,0.15);
        }
        .sidebar-search input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: background 0.3s;
        }
        .sidebar-search input:focus { background: rgba(255,255,255,0.15); }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(44, 182, 125, 0.15); }
        .contact-item .contact-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5f4bd0, #2cb67d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .contact-item .contact-info {
            flex: 1;
            min-width: 0;
        }
        .contact-item .contact-name {
            font-weight: 500;
            font-size: 1rem;
        }
        .contact-item .contact-last {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-item .contact-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ===== Щ…ЩҶШ·ЩӮШ© Ш§Щ„Щ…ШӯШ§ШҜШ«Ш© ===== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }
        .chat-header {
            padding: 12px 20px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 2;
        }
        .chat-header .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb3ff, #77ddff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .chat-header .chat-name {
            flex: 1;
            font-weight: 500;
        }
        .chat-header .chat-status {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .chat-header .chat-actions {
            display: flex;
            gap: 6px;
        }
        .chat-header .chat-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 30px;
            transition: background 0.2s;
        }
        .chat-header .chat-actions button:hover { background: rgba(255,255,255,0.08); }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-image: radial-gradient(circle at 20% 30%, rgba(44,182,125,0.03) 0%, transparent 60%);
        }
        /* ЩҒЩӮШ§Ш№Ш© Ш§Щ„ШұШіШ§Щ„Ш© */
        .message-bubble {
            max-width: 70%;
            padding: 10px 18px;
            border-radius: var(--border-radius);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            animation: floatIn 0.25s ease;
            position: relative;
            align-self: flex-start;
        }
        .message-bubble.own {
            align-self: flex-end;
            background: rgba(44, 182, 125, 0.25);
            border-bottom-left-radius: 6px;
        }
        .message-bubble .sender {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .message-bubble .content {
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .message-bubble .content img {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 4px;
        }
        .message-bubble .meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        .message-bubble .meta .status-icon {
            font-size: 0.75rem;
        }
        .message-bubble .reactions {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .message-bubble .reactions span {
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            transition: transform 0.1s;
        }
        .message-bubble .reactions span:hover { transform: scale(1.2); }
        .message-bubble .reply-indicator {
            font-size: 0.75rem;
            opacity: 0.7;
            border-right: 2px solid #77ddff;
            padding-right: 8px;
            margin-bottom: 4px;
        }
        .message-bubble .pin-indicator {
            position: absolute;
            top: -6px;
            right: -6px;
            font-size: 0.7rem;
            background: rgba(255,215,0,0.2);
            border-radius: 30px;
            padding: 0 6px;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Щ…ШӨЩӮШӘ Ш§Щ„ЩғШӘШ§ШЁШ© */
        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 2px 24px;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .typing-indicator.show { opacity: 1; }

        /* Щ…ЩҶШ·ЩӮШ© Ш§Щ„ШҘШҜШ®Ш§Щ„ */
        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 60px;
            border: none;
            background: rgba(255,255,255,0.07);
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: background 0.3s;
        }
        .input-area input:focus { background: rgba(255,255,255,0.13); }
        .input-area input::placeholder { color: var(--text-muted); }
        .input-area button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-area button:hover { background: rgba(255,255,255,0.08); }
        .input-area button:active { transform: scale(0.9); }
        .input-area .emoji-btn { font-size: 1.5rem; }

        /* Щ„ЩҲШӯШ© Ш§Щ„ШҘЩҠЩ…ЩҲШ¬ЩҠ */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(20,30,50,0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 999;
            max-width: 320px;
            max-height: 220px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .emoji-picker.open { display: grid; }
        .emoji-picker button {
            background: none;
            border: none;
            font-size: 1.5rem;
            padding: 4px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.1s;
        }
        .emoji-picker button:hover { background: rgba(255,255,255,0.15); }

        /* ===== ЩҶШ§ЩҒШ°Ш© Ш§Щ„ЩҒЩҠШҜЩҠЩҲ Ш№ЩҶ ШЁЩҸШ№ШҜ ===== */
        .remote-video {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: black;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 5000;
        }
        .remote-video video {
            width: 100%;
            display: block;
        }
        .remote-video .controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .remote-video .controls button {
            background: rgba(255,0,0,0.8);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ===== ЩҶШ§ЩҒШ°Ш© Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ Ш§Щ„Щ…ШӯЩ„ЩҠШ© ===== */
        .local-camera {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 180px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(0,255,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 4000;
            background: black;
        }
        .local-camera video {
            width: 100%;
            display: block;
        }
        .local-camera .controls {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 4px;
        }
        .local-camera .controls button {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* ===== ШұШіШ§Щ„Ш© "Щ„Ш§ ШӘЩҲШ¬ШҜ Щ…ШӯШ§ШҜШ«Ш©" ===== */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 10px;
        }
        .empty-chat .icon { font-size: 4rem; opacity: 0.4; }

        /* ===== ШӘЩҶШіЩҠЩӮШ§ШӘ Щ…ШӘШ¬Ш§ЩҲШЁШ© ===== */
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: unset; }
            .chat-panel { display: none; }
            .chat-panel.active { display: flex; }
            .sidebar .back-btn { display: block; }
        }
        .back-btn { display: none; }

        /* ===== ШӘШЈШ«ЩҠШұШ§ШӘ ШҘШ¶Ш§ЩҒЩҠШ© ===== */
        .glass-effect {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .floating-shadow {
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .transition-all { transition: var(--transition); }
        .rounded-full { border-radius: 9999px; }

        /* ===== ШҙШұЩҠШ· Ш§Щ„ШӘЩ…ШұЩҠШұ Ш§Щ„Щ…Ш®ШөШө ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<!-- ===== ШҙШ§ШҙШ© ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШҜШ®ЩҲЩ„ ===== -->
<div id="login-screen">
    <div class="logo">рҹ’¬</div>
    <h1>ЩҲШ§ШӘШіШ§ШЁ ШўЩ…ЩҶ</h1>
    <div class="input-group">
        <input type="text" id="login-username" placeholder="Ш§ШіЩ… Ш§Щ„Щ…ШіШӘШ®ШҜЩ…" autocomplete="username">
    </div>
    <div class="input-group">
        <input type="password" id="login-password" placeholder="ЩғЩ„Щ…Ш© Ш§Щ„Щ…ШұЩҲШұ" autocomplete="current-password">
    </div>
    <button id="login-btn">ШҜШ®ЩҲЩ„</button>
    <div class="error" id="login-error"></div>
</div>

<!-- ===== Ш§Щ„ШӘШ·ШЁЩҠЩӮ Ш§Щ„ШұШҰЩҠШіЩҠ ===== -->
<div id="app">
    <!-- Ш§Щ„ШҙШұЩҠШ· Ш§Щ„Ш¬Ш§ЩҶШЁЩҠ -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile">
                <div class="avatar" id="my-avatar">U</div>
                <div>
                    <div id="my-name-display">Щ…ШіШӘШ®ШҜЩ…</div>
                    <div class="status">
                        <span class="dot online" id="status-dot"></span>
                        <span id="status-text">Щ…ШӘШөЩ„</span>
                    </div>
                </div>
            </div>
            <div class="actions">
                <button id="logout-btn" title="ШӘШіШ¬ЩҠЩ„ Ш®ШұЩҲШ¬">рҹҡӘ</button>
                <button id="settings-btn" title="Ш§Щ„ШҘШ№ШҜШ§ШҜШ§ШӘ">вҡҷпёҸ</button>
            </div>
        </div>
        <div class="sidebar-search">
            <input type="text" id="search-contacts" placeholder="ШЁШӯШ« ЩҒЩҠ Ш¬ЩҮШ§ШӘ Ш§Щ„Ш§ШӘШөШ§Щ„...">
        </div>
        <div class="contact-list" id="contact-list"></div>
    </div>

    <!-- Щ…ЩҶШ·ЩӮШ© Ш§Щ„Щ…ШӯШ§ШҜШ«Ш© -->
    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">
            <div class="chat-avatar" id="chat-avatar">рҹӨ–</div>
            <div class="chat-name" id="chat-name">Ш§Ш®ШӘШұ Щ…ШӯШ§ШҜШ«Ш©</div>
            <div class="chat-status" id="chat-status"></div>
            <div class="chat-actions">
                <button id="video-call-btn" title="Щ…ЩғШ§Щ„Щ…Ш© ЩҒЩҠШҜЩҠЩҲ">рҹ“№</button>
                <button id="voice-call-btn" title="Щ…ЩғШ§Щ„Щ…Ш© ШөЩҲШӘЩҠШ©">рҹ“һ</button>
                <button id="attach-btn" title="Щ…ШұЩҒЩӮ">рҹ“Һ</button>
            </div>
        </div>
        <div class="messages-area" id="messages-area">
            <div class="empty-chat">
                <div class="icon">рҹ’¬</div>
                <p>Ш§Ш®ШӘШұ Щ…ШӯШ§ШҜШ«Ш© Щ„ШӘШЁШҜШЈ Ш§Щ„Щ…ШұШ§ШіЩ„Ш© Ш§Щ„Щ…ШҙЩҒШұШ©</p>
            </div>
        </div>
        <div class="typing-indicator" id="typing-indicator"></div>
        <div class="input-area" style="position:relative;">
            <button class="emoji-btn" id="emoji-toggle">рҹҳҠ</button>
            <div class="emoji-picker" id="emoji-picker"></div>
            <input type="text" id="message-input" placeholder="Ш§ЩғШӘШЁ ШұШіШ§Щ„Ш©..." disabled>
            <button id="send-btn">рҹ“Ё</button>
        </div>
    </div>
</div>

<!-- ===== ЩҶШ§ЩҒШ°Ш© Ш§Щ„ЩҒЩҠШҜЩҠЩҲ Ш№ЩҶ ШЁЩҸШ№ШҜ (ШӘШ¶Ш§ЩҒ ШҜЩҠЩҶШ§Щ…ЩҠЩғЩҠШ§ЩӢ) ===== -->
<!-- ===== Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ Ш§Щ„Щ…ШӯЩ„ЩҠШ© (ШӘШ¶Ш§ЩҒ ШҜЩҠЩҶШ§Щ…ЩҠЩғЩҠШ§ЩӢ) ===== -->

<!-- ===== Щ…ЩғШӘШЁШ§ШӘ Ш®Ш§ШұШ¬ЩҠШ© ===== -->
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // ==================================================================
    //  1. Ш§Щ„ШӘШҙЩҒЩҠШұ (RSA-2048 + AES-256-GCM)
    // ==================================================================
    let myKeyPair = null;
    let myPublicKeyPem = null;
    let myUserId = null;
    let myPassword = null;
    let myName = '';

    // ШӘШ®ШІЩҠЩҶ Ш§Щ„Щ…ЩҒШ§ШӘЩҠШӯ ЩҲШ§Щ„Щ…ШіШӘШ®ШҜЩ…ЩҠЩҶ
    let users = new Map(); // userId -> { name, publicKey, conn, status }
    let currentPeer = null;
    let currentConn = null;
    let currentRecipientId = null;

    // ШЁЩҠШ§ЩҶШ§ШӘ Ш§Щ„Щ…ШӯШ§ШҜШ«Ш§ШӘ Ш§Щ„Щ…ШӯЩ„ЩҠШ©
    let chats = JSON.parse(localStorage.getItem('chats') || '{}');
    let pendingMessages = JSON.parse(localStorage.getItem('pendingMessages') || '[]');

    // Щ…ШӘШәЩҠШұШ§ШӘ WebRTC
    let pc = null;
    let localStream = null;
    let remoteStream = null;

    // ШӯШ§Щ„Ш© Ш§Щ„ШӘШ·ШЁЩҠЩӮ
    let isLoggedIn = false;
    let isCallActive = false;

    // ===== ШҜЩҲШ§Щ„ Ш§Щ„ШӘШҙЩҒЩҠШұ =====
    async function generateKeyPair() {
        return await crypto.subtle.generateKey(
            { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: "SHA-256" },
            true, ["encrypt","decrypt"]
        );
    }
    function ab2b64(ab) { return btoa(String.fromCharCode(...new Uint8Array(ab))); }
    function b642ab(b64) { return new Uint8Array(atob(b64).split('').map(c=>c.charCodeAt(0))).buffer; }
    async function exportPublicKey(key) { return ab2b64(await crypto.subtle.exportKey("spki", key)); }
    async function importPublicKey(pem) { return await crypto.subtle.importKey("spki", b642ab(pem), { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]); }
    async function encryptForPeer(message, recipientPublicKey, isImage=false) {
        const sessionKey = crypto.getRandomValues(new Uint8Array(32));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const aesKey = await crypto.subtle.importKey("raw", sessionKey, { name: "AES-GCM" }, false, ["encrypt"]);
        const encryptedMsg = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, new TextEncoder().encode(message));
        const encryptedKey = await crypto.subtle.encrypt({ name: "RSA-OAEP" }, recipientPublicKey, sessionKey);
        return { iv: ab2b64(iv), encryptedData: ab2b64(encryptedMsg), encryptedKey: ab2b64(encryptedKey), isImage };
    }
    async function decryptMessage(pkg) {
        const iv = b642ab(pkg.iv);
        const encryptedData = b642ab(pkg.encryptedData);
        const encryptedKey = b642ab(pkg.encryptedKey);
        const sessionKey = await crypto.subtle.decrypt({ name: "RSA-OAEP" }, myKeyPair.privateKey, encryptedKey);
        const aesKey = await crypto.subtle.importKey("raw", sessionKey, { name: "AES-GCM" }, false, ["decrypt"]);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, encryptedData);
        return new TextDecoder().decode(decrypted);
    }

    // ==================================================================
    //  2. ШҘШҜШ§ШұШ© Ш§Щ„ШӯШіШ§ШЁШ§ШӘ (ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШҜШ®ЩҲЩ„)
    // ==================================================================
    function loadAccounts() {
        try { return JSON.parse(localStorage.getItem('accounts') || '{}'); } catch { return {}; }
    }
    function saveAccounts(accounts) {
        localStorage.setItem('accounts', JSON.stringify(accounts));
    }

    document.getElementById('login-btn').onclick = async () => {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const errorEl = document.getElementById('login-error');
        if (!username || !password) {
            errorEl.textContent = 'ЩҠШұШ¬Щү ШҘШҜШ®Ш§Щ„ Ш§ШіЩ… Ш§Щ„Щ…ШіШӘШ®ШҜЩ… ЩҲЩғЩ„Щ…Ш© Ш§Щ„Щ…ШұЩҲШұ';
            errorEl.classList.add('show');
            return;
        }
        const accounts = loadAccounts();
        if (accounts[username] && accounts[username] !== password) {
            errorEl.textContent = 'ЩғЩ„Щ…Ш© Щ…ШұЩҲШұ Ш®Ш§Ш·ШҰШ©';
            errorEl.classList.add('show');
            return;
        }
        // ШӘШіШ¬ЩҠЩ„ Щ…ШіШӘШ®ШҜЩ… Ш¬ШҜЩҠШҜ ШЈЩҲ ШӘШіШ¬ЩҠЩ„ ШҜШ®ЩҲЩ„
        accounts[username] = password;
        saveAccounts(accounts);
        myUserId = username;
        myPassword = password;
        myName = username;
        errorEl.classList.remove('show');
        // ШЁШҜШЎ Ш§Щ„Ш§ШӘШөШ§Щ„ Ш№ШЁШұ PeerJS
        await startApp();
    };

    // ==================================================================
    //  3. ШӘШ·ШЁЩҠЩӮ PeerJS
    // ==================================================================
    async function startApp() {
        // ШӘЩҲЩ„ЩҠШҜ Ш§Щ„Щ…ЩҒШ§ШӘЩҠШӯ
        myKeyPair = await generateKeyPair();
        myPublicKeyPem = await exportPublicKey(myKeyPair.publicKey);

        // ШҘШёЩҮШ§Шұ Ш§Щ„ЩҲШ§Ш¬ЩҮШ© Ш§Щ„ШұШҰЩҠШіЩҠШ©
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.add('active');
        document.getElementById('my-name-display').textContent = myName;
        document.getElementById('my-avatar').textContent = myName.charAt(0).toUpperCase();

        // ШҘЩҶШҙШ§ШЎ Peer
        currentPeer = new Peer(myUserId, {
            host: '0.peerjs.com',
            port: 443,
            secure: true
        });

        currentPeer.on('open', (id) => {
            console.log('вң… Щ…ШӘШөЩ„ ШЁЩҖ PeerJS:', id);
            // ШҘШұШіШ§Щ„ Ш§Щ„Щ…ЩҒШӘШ§Шӯ Ш§Щ„Ш№Ш§Щ… Щ„Щ„Щ…ШіШӘШ®ШҜЩ…ЩҠЩҶ Ш§Щ„Ш¬ШҜШҜ
            // Щ„ЩғЩҶ PeerJS Щ„Ш§ ЩҠШіЩ…Шӯ ШЁШЁШ« Щ…ШЁШ§ШҙШұШҢ ШіЩҶШіШӘШ®ШҜЩ… Ш§Щ„Ш§ШӘШөШ§Щ„Ш§ШӘ Ш§Щ„ЩҶШҙШ·Ш©
            updateStatus('online');
            // Щ…Ш№Ш§Щ„Ш¬Ш© ЩӮШ§ШҰЩ…Ш© Ш¬ЩҮШ§ШӘ Ш§Щ„Ш§ШӘШөШ§Щ„ Ш§Щ„Щ…Ш®ШІЩҶШ©
            loadContactsFromStorage();
        });

        currentPeer.on('connection', (conn) => {
            setupConnection(conn);
        });

        currentPeer.on('error', (err) => {
            console.warn('вҡ пёҸ Ш®Ш·ШЈ PeerJS:', err);
        });

        // Ш§ШіШӘШ№Ш§ШҜШ© Ш§Щ„Щ…ШӯШ§ШҜШ«Ш§ШӘ Ш§Щ„ЩӮШҜЩҠЩ…Ш©
        loadChatHistory();

        // ШЁШҜШЎ Щ…Ш№Ш§Щ„Ш¬Ш© Ш§Щ„ШұШіШ§ШҰЩ„ Ш§Щ„Щ…ШӨШ¬Щ„Ш©
        processPendingQueue();

        // ШӘЩ…ЩғЩҠЩҶ Ш§Щ„ШҘШҜШ®Ш§Щ„
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
    }

    // ==================================================================
    //  4. ШҘШҜШ§ШұШ© Ш¬ЩҮШ§ШӘ Ш§Щ„Ш§ШӘШөШ§Щ„ ЩҲШ§Щ„Щ…ШӯШ§ШҜШ«Ш§ШӘ
    // ==================================================================
    function loadContactsFromStorage() {
        // ЩҒЩҠ ЩҮШ°Ш§ Ш§Щ„ШӘШ·ШЁЩҠЩӮШҢ Ш¬ЩҮШ§ШӘ Ш§Щ„Ш§ШӘШөШ§Щ„ ЩҮЩҠ Ш§Щ„Щ…ШіШӘШ®ШҜЩ…ЩҲЩҶ Ш§Щ„Ш°ЩҠЩҶ ЩҶШӘЩҲШ§ШөЩ„ Щ…Ш№ЩҮЩ…
        // ШіЩҠШӘЩ… ШҘШ¶Ш§ЩҒШӘЩҮЩ… Ш№ЩҶШҜ ШЈЩҲЩ„ Ш§ШӘШөШ§Щ„
        const contactList = document.getElementById('contact-list');
        contactList.innerHTML = '';
        for (let [id, info] of users) {
            if (id === myUserId) continue;
            addContactToList(id, info.name);
        }
    }

    function addContactToList(userId, name) {
        const list = document.getElementById('contact-list');
        // ШӘШ¬ЩҶШЁ Ш§Щ„ШӘЩғШұШ§Шұ
        if (list.querySelector(`[data-id="${userId}"]`)) return;
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.dataset.id = userId;
        div.innerHTML = `
            <div class="contact-avatar">${name.charAt(0).toUpperCase()}</div>
            <div class="contact-info">
                <div class="contact-name">${name}</div>
                <div class="contact-last">${chats[userId]?.length ? 'ШўШ®Шұ ШұШіШ§Щ„Ш©...' : 'ШЁШҜШЎ Щ…ШӯШ§ШҜШ«Ш©'}</div>
            </div>
            <div class="contact-time">${new Date().toLocaleTimeString()}</div>
        `;
        div.onclick = () => openChat(userId);
        list.appendChild(div);
    }

    function openChat(userId) {
        const info = users.get(userId);
        if (!info) {
            // ШҘШ°Ш§ Щ„Щ… ЩҠЩғЩҶ Ш§Щ„Щ…ШіШӘШ®ШҜЩ… ЩҒЩҠ Ш§Щ„Ш®ШұЩҠШ·Ш©ШҢ ЩҶШӯШ§ЩҲЩ„ Ш§Щ„Ш§ШӘШөШ§Щ„ ШЁЩҮ
            connectToPeer(userId);
            return;
        }
        currentRecipientId = userId;
        currentConn = info.conn;
        // ШӘШӯШҜЩҠШ« ЩҲШ§Ш¬ЩҮШ© Ш§Щ„Щ…ШӯШ§ШҜШ«Ш©
        document.getElementById('chat-name').textContent = info.name || userId;
        document.getElementById('chat-avatar').textContent = (info.name || userId).charAt(0).toUpperCase();
        document.getElementById('chat-status').textContent = info.status === 'online' ? 'рҹҹў Щ…ШӘШөЩ„' : 'вҡӘ ШәЩҠШұ Щ…ШӘШөЩ„';
        // ШӘЩ…ЩғЩҠЩҶ Ш§Щ„ШҘШҜШ®Ш§Щ„
        document.getElementById('message-input').disabled = false;
        // Ш№ШұШ¶ Ш§Щ„Щ…ШӯШ§ШҜШ«Ш©
        loadChatHistory(userId);
        // ШӘЩ…ЩҠЩҠШІ Ш§Щ„Ш№ЩҶШөШұ Ш§Щ„ЩҶШҙШ·
        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`.contact-item[data-id="${userId}"]`);
        if (activeEl) activeEl.classList.add('active');
        // ЩҒЩҠ Ш§Щ„ШҙШ§ШҙШ§ШӘ Ш§Щ„ШөШәЩҠШұШ©: ШҘШ®ЩҒШ§ШЎ Ш§Щ„ЩӮШ§ШҰЩ…Ш© Ш§Щ„Ш¬Ш§ЩҶШЁЩҠШ©
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('chat-panel').classList.add('active');
        }
    }

    function loadChatHistory(userId) {
        const area = document.getElementById('messages-area');
        area.innerHTML = '';
        if (chats[userId]) {
            chats[userId].forEach(msg => {
                renderMessage(msg.text, msg.from === myUserId, msg.from, msg.isImage, msg.msgId);
            });
        }
        area.scrollTop = area.scrollHeight;
    }

    function renderMessage(text, isOwn, senderId, isImage=false, msgId=null) {
        const area = document.getElementById('messages-area');
        const div = document.createElement('div');
        div.className = `message-bubble ${isOwn ? 'own' : ''}`;
        if (msgId) div.dataset.msgid = msgId;
        const senderSpan = document.createElement('div');
        senderSpan.className = 'sender';
        senderSpan.textContent = isOwn ? 'ШЈЩҶШӘ' : (users.get(senderId)?.name || senderId);
        div.appendChild(senderSpan);
        const content = document.createElement('div');
        content.className = 'content';
        if (isImage && text.startsWith('data:image')) {
            const img = document.createElement('img');
            img.src = text;
            content.appendChild(img);
        } else {
            content.textContent = text;
        }
        div.appendChild(content);
        const meta = document.createElement('div');
        meta.className = 'meta';
        const time = document.createElement('span');
        time.textContent = new Date().toLocaleTimeString();
        meta.appendChild(time);
        const status = document.createElement('span');
        status.className = 'status-icon';
        status.textContent = isOwn ? 'вң“' : '';
        meta.appendChild(status);
        div.appendChild(meta);
        // ШҘЩҠЩ…ЩҲШ¬ЩҠ ШӘЩҒШ§Ш№Щ„
        const reactions = document.createElement('div');
        reactions.className = 'reactions';
        ['рҹ‘Қ','вқӨпёҸ','рҹҳӮ','рҹҳ®'].forEach(r => {
            const span = document.createElement('span');
            span.textContent = r;
            span.onclick = () => sendReaction(r, msgId);
            reactions.appendChild(span);
        });
        div.appendChild(reactions);
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function sendReaction(reaction, msgId) {
        if (!currentConn) return;
        currentConn.send({ type: 'reaction', reaction, msgId });
    }

    // ==================================================================
    //  5. ШҘШҜШ§ШұШ© Ш§Щ„Ш§ШӘШөШ§Щ„Ш§ШӘ Щ…Ш№ Ш§Щ„ШЈЩӮШұШ§ЩҶ
    // ==================================================================
    function connectToPeer(peerId) {
        if (!currentPeer) return;
        const conn = currentPeer.connect(peerId);
        conn.on('open', () => {
            // ШҘШұШіШ§Щ„ Ш§Щ„Щ…ЩҒШӘШ§Шӯ Ш§Щ„Ш№Ш§Щ…
            conn.send({ type: 'publicKey', publicKey: myPublicKeyPem, name: myName });
            users.set(peerId, { name: peerId, publicKey: null, conn, status: 'online' });
            setupConnection(conn);
        });
        conn.on('error', (err) => console.warn('Ш®Ш·ШЈ ЩҒЩҠ Ш§Щ„Ш§ШӘШөШ§Щ„:', err));
    }

    function setupConnection(conn) {
        conn.on('data', async (data) => {
            if (data.type === 'publicKey') {
                const pubKey = await importPublicKey(data.publicKey);
                const name = data.name || conn.peer;
                users.set(conn.peer, { name, publicKey: pubKey, conn, status: 'online' });
                addContactToList(conn.peer, name);
                appendSystemMessage(`рҹ”‘ Ш§ШіШӘЩ„Ш§Щ… Щ…ЩҒШӘШ§Шӯ Ш№Ш§Щ… Щ…ЩҶ ${name}`);
            } else if (data.type === 'message') {
                const text = await decryptMessage(data.encrypted);
                const isImage = data.encrypted.isImage;
                const fromId = conn.peer;
                // ШӯЩҒШё Ш§Щ„ШұШіШ§Щ„Ш©
                if (!chats[fromId]) chats[fromId] = [];
                chats[fromId].push({ from: fromId, text, timestamp: Date.now(), isImage, msgId: data.msgId });
                localStorage.setItem('chats', JSON.stringify(chats));
                // Ш№ШұШ¶ ШҘШ°Ш§ ЩғШ§ЩҶШӘ Ш§Щ„Щ…ШӯШ§ШҜШ«Ш© Щ…ЩҒШӘЩҲШӯШ©
                if (currentRecipientId === fromId) {
                    renderMessage(text, false, fromId, isImage, data.msgId);
                }
                // ШӘШӯШҜЩҠШ« Ш§Щ„ЩӮШ§ШҰЩ…Ш© Ш§Щ„Ш¬Ш§ЩҶШЁЩҠШ©
                updateContactLast(fromId, text);
                // ШҘШҙШ№Ш§Шұ
                playNotification();
                // ШӘШЈЩғЩҠШҜ Ш§Щ„Ш§ШіШӘЩ„Ш§Щ…
                conn.send({ type: 'delivery', msgId: data.msgId });
            } else if (data.type === 'delivery') {
                // ШӘШӯШҜЩҠШ« ШӯШ§Щ„Ш© Ш§Щ„ШӘШіЩ„ЩҠЩ… (Ш§Ш®ШӘЩҠШ§ШұЩҠ)
                const el = document.querySelector(`.message-bubble[data-msgid="${data.msgId}"] .status-icon`);
                if (el) el.textContent = 'вң“вң“';
            } else if (data.type === 'typing') {
                showTyping(data.isTyping, conn.peer);
            } else if (data.type === 'webrtc-offer') {
                handleWebRTCOffer(conn.peer, data.offer);
            } else if (data.type === 'webrtc-answer') {
                if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'ice-candidate') {
                if (pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            } else if (data.type === 'reaction') {
                appendSystemMessage(`рҹ‘Қ ШӘЩҒШ§Ш№Щ„ ${data.reaction} Щ…ЩҶ ${users.get(conn.peer)?.name}`);
            }
        });
        conn.on('close', () => {
            users.delete(conn.peer);
            // ШҘШІШ§Щ„Ш© Щ…ЩҶ Ш§Щ„ЩӮШ§ШҰЩ…Ш© Ш§Щ„Ш¬Ш§ЩҶШЁЩҠШ©
            const el = document.querySelector(`.contact-item[data-id="${conn.peer}"]`);
            if (el) el.remove();
            if (currentRecipientId === conn.peer) {
                document.getElementById('chat-name').textContent = 'Ш§Ш®ШӘШұ Щ…ШӯШ§ШҜШ«Ш©';
                document.getElementById('message-input').disabled = true;
            }
        });
    }

    // ==================================================================
    //  6. ШҘШұШіШ§Щ„ Ш§Щ„ШұШіШ§ШҰЩ„
    // ==================================================================
    async function sendMessage(text, isImage=false, imageDataURL=null) {
        if (!currentConn) {
            // ШӯЩҒШё Щ…ШӨЩӮШӘШ§ЩӢ
            pendingMessages.push({ to: currentRecipientId, text, isImage, dataURL: imageDataURL, timestamp: Date.now() });
            localStorage.setItem('pendingMessages', JSON.stringify(pendingMessages));
            appendSystemMessage('рҹ“Ұ ШұШіШ§Щ„Ш© Щ…ШӨШ¬Щ„Ш© (ШәЩҠШұ Щ…ШӘШөЩ„)');
            return;
        }
        const recipient = users.get(currentRecipientId);
        if (!recipient || !recipient.publicKey) {
            alert('Ш§Щ„Щ…ЩҒШӘШ§Шӯ Ш§Щ„Ш№Ш§Щ… ШәЩҠШұ Щ…ШӘЩҲЩҒШұ ШЁШ№ШҜ');
            return;
        }
        let content = text;
        if (isImage && imageDataURL) content = imageDataURL;
        const msgId = Date.now();
        const encrypted = await encryptForPeer(content, recipient.publicKey, isImage);
        currentConn.send({ type: 'message', encrypted, msgId });
        // ШӯЩҒШё Щ…ШӯЩ„ЩҠШ§ЩӢ
        if (!chats[currentRecipientId]) chats[currentRecipientId] = [];
        chats[currentRecipientId].push({ from: myUserId, text, timestamp: Date.now(), isImage, msgId });
        localStorage.setItem('chats', JSON.stringify(chats));
        renderMessage(text, true, myUserId, isImage, msgId);
        updateContactLast(currentRecipientId, text);
    }

    async function processPendingQueue() {
        for (let i = 0; i < pendingMessages.length; i++) {
            const msg = pendingMessages[i];
            const info = users.get(msg.to);
            if (info && info.conn && info.publicKey) {
                currentRecipientId = msg.to;
                currentConn = info.conn;
                await sendMessage(msg.text, msg.isImage, msg.dataURL);
                pendingMessages.splice(i, 1);
                i--;
            }
        }
        localStorage.setItem('pendingMessages', JSON.stringify(pendingMessages));
    }

    // ==================================================================
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startCall(mediaType = 'video') {
        if (!currentConn) return alert('Ш§Ш®ШӘШұ Щ…ШіШӘЩ„Щ… ШЈЩҲЩ„Ш§ЩӢ');
        try {
            const constraints = mediaType === 'video' ? { video: true, audio: true } : { audio: true };
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            // Ш№ШұШ¶ Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ Ш§Щ„Щ…ШӯЩ„ЩҠШ©
            showLocalCamera(localStream);
            pc = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = (event) => {
                remoteStream = event.streams[0];
                showRemoteVideo(remoteStream);
            };
            pc.onicecandidate = (e) => {
                if (e.candidate) currentConn.send({ type: 'ice-candidate', candidate: e.candidate });
            };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            currentConn.send({ type: 'webrtc-offer', offer });
            isCallActive = true;
        } catch (e) {
            alert('ШӘШ№Ш°Шұ Ш§Щ„ЩҲШөЩҲЩ„ ШҘЩ„Щү Ш§Щ„ЩғШ§Щ…ЩҠШұШ§/Ш§Щ„Щ…ЩҠЩғШұЩҲЩҒЩҲЩҶ');
        }
    }

    async function handleWebRTCOffer(fromId, offer) {
        if (!confirm(`Щ…ЩғШ§Щ„Щ…Ш© Щ…ЩҶ ${users.get(fromId)?.name || fromId}`)) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            showLocalCamera(localStream);
            pc = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            users.get(fromId)?.conn?.send({ type: 'webrtc-answer', answer });
            pc.ontrack = (e) => {
                remoteStream = e.streams[0];
                showRemoteVideo(remoteStream);
            };
            pc.onicecandidate = (e) => {
                if (e.candidate) users.get(fromId)?.conn?.send({ type: 'ice-candidate', candidate: e.candidate });
            };
            isCallActive = true;
        } catch (e) {
            alert('ШӘШ№Ш°Шұ Ш§Щ„ЩҲШөЩҲЩ„ ШҘЩ„Щү Ш§Щ„ЩғШ§Щ…ЩҠШұШ§');
        }
    }

    function showLocalCamera(stream) {
        let container = document.querySelector('.local-camera');
        if (!container) {
            container = document.createElement('div');
            container.className = 'local-camera';
            container.innerHTML = `<video autoplay muted playsinline></video><div class="controls"><button id="end-call">ШҘЩҶЩҮШ§ШЎ</button><button id="toggle-mic">рҹҺӨ</button><button id="toggle-cam">рҹ“·</button></div>`;
            document.body.appendChild(container);
            container.querySelector('#end-call').onclick = endCall;
            container.querySelector('#toggle-mic').onclick = () => {
                const track = localStream?.getAudioTracks()[0];
                if (track) track.enabled = !track.enabled;
            };
            container.querySelector('#toggle-cam').onclick = () => {
                const track = localStream?.getVideoTracks()[0];
                if (track) track.enabled = !track.enabled;
            };
        }
        container.querySelector('video').srcObject = stream;
    }

    function showRemoteVideo(stream) {
        let container = document.querySelector('.remote-video');
        if (!container) {
            container = document.createElement('div');
            container.className = 'remote-video';
            container.innerHTML = `<video autoplay playsinline></video><div class="controls"><button id="end-remote-call">ШҘЩҶЩҮШ§ШЎ</button></div>`;
            document.body.appendChild(container);
            container.querySelector('#end-remote-call').onclick = endCall;
        }
        container.querySelector('video').srcObject = stream;
    }

    function endCall() {
        if (pc) {
            pc.close();
            pc = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (remoteStream) {
            remoteStream.getTracks().forEach(t => t.stop());
            remoteStream = null;
        }
        document.querySelectorAll('.local-camera, .remote-video').forEach(el => el.remove());
        isCallActive = false;
    }

    document.getElementById('video-call-btn').onclick = () => startCall('video');
    document.getElementById('voice-call-btn').onclick = () => startCall('audio');

        }
    }

    function playNotification() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
        } catch (e) {}
        if (navigator.vibrate) navigator.vibrate(200);
    }
